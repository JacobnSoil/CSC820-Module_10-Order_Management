name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: jmy5323/module10

jobs:
  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  test:
    name: Smoke test image
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Pull image
        run: docker pull ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Run container
        run: |
          docker run -d --name test-app -p 3000:3000 ${{ env.IMAGE_NAME }}:${{ github.sha }}
          sleep 5

      - name: Test API responds
        run: |
          curl --fail --retry 5 --retry-delay 2 http://localhost:3000/ || exit 1

      - name: Cleanup
        if: always()
        run: docker rm -f test-app || true

  deploy:
    name: Deploy to k3s
    runs-on: self-hosted
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Apply Kubernetes manifests
        run: |
          export KUBECONFIG=$HOME/.kube/config
          kubectl apply -f deployment.yaml
          kubectl apply -f service.yaml

      - name: Force rollout to pull new image
        run: |
          export KUBECONFIG=$HOME/.kube/config
          kubectl rollout restart deployment order-management
          kubectl rollout status deployment order-management --timeout=120s

      - name: Show running pods
        run: |
          export KUBECONFIG=$HOME/.kube/config
          kubectl get pods
          kubectl get service order-management-service